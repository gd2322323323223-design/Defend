<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>語文防衛戰 — Defend</title>
  <link rel="stylesheet" href="css/style.css?v=1.9.3">
</head>
<body>
  <div id="version-badge" class="version-badge" title="遊戲版本">v1.9.3</div>
  <div id="app">
    <div id="game-shell">
    <!-- 3D 場景背景 -->
    <canvas id="scene-canvas"></canvas>

    <!-- 主選單 -->
    <section id="screen-menu" class="screen active">
      <h1 class="game-title">語文防衛戰</h1>
      <div class="mode-buttons">
        <button class="btn btn-primary" data-mode="single">單人模式</button>
        <button class="btn btn-accent" data-mode="dual">雙人模式</button>
      </div>
    </section>

    <!-- 職業選擇 -->
    <section id="screen-class" class="screen">
      <h2>選擇你的職業</h2>
      <div id="class-grid" class="class-grid"></div>
      <button id="btn-start-battle" class="btn btn-primary" disabled>開始迎戰</button>
    </section>

    <!-- AI 叫陣 -->
    <section id="screen-taunt" class="screen">
      <div id="enemy-dialogue" class="dialogue-box">
        <span class="dialogue-speaker">👹 骷髏魔王</span>
        <p id="taunt-text" class="dialogue-text"></p>
      </div>
      <p id="taunt-countdown" class="taunt-countdown">準備迎戰中…</p>
    </section>

    <!-- 戰鬥畫面：上半 Boss 3D / 下半玩家分屏 -->
    <section id="screen-battle" class="screen">
      <div class="battle-layout">
        <div class="boss-zone" id="boss-zone">
          <div class="boss-hud"></div>
        </div>

        <div id="players-row" class="players-row">
          <div id="player1-zone" class="player-zone player-zone-p1 hidden">
            <div class="zone-class-title">
              <span id="p1-class-icon" class="class-icon">🛡️</span>
              <span id="p1-class-name">騎士</span>
              <span id="p1-zone-timer" class="zone-timer hidden">10</span>
            </div>
            <div class="zone-matrix-wrap">
              <button type="button" id="p1-ready-btn" class="btn-ready-turn hidden">準備好了</button>
              <div id="matrix-p1" class="word-matrix hidden"></div>
            </div>
            <span id="p1-score" class="zone-score">答對: 0</span>
          </div>
          <div id="player2-zone" class="player-zone player-zone-p2 hidden">
            <div class="zone-class-title">
              <span id="p2-class-icon" class="class-icon">🔮</span>
              <span id="p2-class-name">法師</span>
              <span id="p2-zone-timer" class="zone-timer hidden">10</span>
            </div>
            <div class="zone-matrix-wrap">
              <button type="button" id="p2-ready-btn" class="btn-ready-turn hidden">準備好了</button>
              <div id="matrix-p2" class="word-matrix hidden"></div>
            </div>
            <span id="p2-score" class="zone-score">答對: 0</span>
          </div>
        </div>
      </div>

      <div id="turn-indicator" class="turn-indicator hidden"></div>
      <div id="round-score-popup" class="round-score-popup hidden" aria-live="polite">
        <div class="score-popup-inner">
          <span id="score-popup-count" class="score-popup-count">0</span>
          <span class="score-popup-label">個字詞答對！</span>
        </div>
      </div>
    </section>

    <!-- 浮動戰鬥 UI（跟隨 3D 模型） -->
    <div id="boss-head-stack" class="boss-head-stack hidden">
      <div id="boss-name-floating" class="boss-name-floating">👹 骷髏魔王</div>
      <div id="boss-hp-floating" class="boss-hp-floating">
        <div class="hp-bar-container boss-floating-bar">
          <div id="enemy-hp-bar" class="hp-bar"></div>
          <span id="enemy-hp-text" class="hp-text">50 / 50</span>
        </div>
      </div>
    </div>
    <div id="team-hp-floating" class="team-hp-floating hidden">
      <div class="team-hp-block">
        <span class="team-hp-label">❤️ 隊伍生命</span>
        <div class="hp-bar-container small team-floating-bar">
          <div class="hp-bar player-hp-fill" id="team-hp-bar"></div>
          <span class="hp-text" id="team-hp-text">20 / 20</span>
        </div>
      </div>
      <div id="team-shield-row" class="team-shield-row hidden">
        🛡️ 盾甲 <span id="team-shield-text">0</span>
      </div>
    </div>
    <div id="hero-labels">
      <div id="hero-label-0" class="hero-float-label hidden"></div>
      <div id="hero-label-1" class="hero-float-label hidden"></div>
    </div>

    <!-- 結算畫面 -->
    <section id="screen-result" class="screen">
      <h2 id="result-title">戰鬥結算</h2>
      <div id="result-stats" class="result-stats"></div>
      <div id="equipment-unlock" class="equipment-unlock hidden">
        <h3>🎉 傳奇裝備解鎖！</h3>
        <p>弩箭十字弓已裝備至英雄手上！</p>
      </div>
      <button id="btn-replay" class="btn btn-primary">再戰一局</button>
    </section>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "@/version.js": "./js/version.js?v=1.9.3",
      "@/game.js": "./js/game.js?v=1.9.3",
      "@/matrix.js": "./js/matrix.js?v=1.9.3",
      "@/ai-taunt.js": "./js/ai-taunt.js?v=1.9.3",
      "@/combat.js": "./js/combat.js?v=1.9.3",
      "@/models-config.js": "./js/models-config.js?v=1.9.3",
      "@/scene3d.js": "./js/scene3d.js?v=1.9.3",
      "@/vfx.js": "./js/vfx.js?v=1.9.3",
      "@/hit-effects.js": "./js/hit-effects.js?v=1.9.3",
      "@/equipment.js": "./js/equipment.js?v=1.9.3",
      "@/class-preview.js": "./js/class-preview.js?v=1.9.3"
    }
  }
  </script>
  <script type="module" src="js/main.js?v=1.9.3"></script>
</body>
</html>
