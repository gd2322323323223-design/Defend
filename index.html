<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>語文防衛戰 — Defend</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 3D 場景背景 -->
    <canvas id="scene-canvas"></canvas>

    <!-- 主選單 -->
    <section id="screen-menu" class="screen active">
      <h1 class="game-title">語文防衛戰</h1>
      <p class="subtitle">AI 狂妄叫陣 ➔ 語文技能 ➔ 3D 動畫結算 ➔ 斬殺敵方</p>
      <div class="mode-buttons">
        <button class="btn btn-primary" data-mode="single">單人模式</button>
        <button class="btn btn-primary" data-mode="dual-sequential">雙人模式（輪流）</button>
        <button class="btn btn-accent" data-mode="dual-split">雙人分屏（同時）</button>
      </div>
    </section>

    <!-- 職業選擇 -->
    <section id="screen-class" class="screen">
      <h2>選擇你的職業</h2>
      <div id="class-grid" class="class-grid"></div>
      <button id="btn-start-battle" class="btn btn-primary" disabled>開始迎戰</button>
    </section>

    <!-- AI 叫陣 -->
    <section id="screen-taunt" class="screen">
      <div id="enemy-dialogue" class="dialogue-box">
        <span class="dialogue-speaker">👹 骷髏魔王</span>
        <p id="taunt-text" class="dialogue-text"></p>
      </div>
      <button id="btn-ready" class="btn btn-primary">準備迎戰！</button>
    </section>

    <!-- 戰鬥畫面：上半 Boss 3D / 下半玩家分屏 -->
    <section id="screen-battle" class="screen">
      <div class="battle-layout">
        <div class="boss-zone" id="boss-zone">
          <div class="boss-hud">
            <div class="battle-header">
              <div class="enemy-info">
                <span class="enemy-name">👹 骷髏魔王</span>
                <div class="hp-bar-container">
                  <div id="enemy-hp-bar" class="hp-bar"></div>
                  <span id="enemy-hp-text" class="hp-text">20 / 20</span>
                </div>
              </div>
              <div id="round-timer" class="timer">10</div>
            </div>
            <div id="player-status" class="player-status"></div>
          </div>
        </div>

        <div id="players-row" class="players-row">
          <div id="player1-zone" class="player-zone player-zone-p1 hidden">
            <div class="zone-header">
              <span class="zone-label">玩家 1</span>
              <span id="p1-class-icon" class="class-icon">🛡️</span>
              <span id="p1-class-name">騎士</span>
              <span id="p1-score" class="zone-score">護盾: 0</span>
            </div>
            <div id="matrix-p1" class="word-matrix"></div>
          </div>
          <div id="player2-zone" class="player-zone player-zone-p2 hidden">
            <div class="zone-header">
              <span class="zone-label">玩家 2</span>
              <span id="p2-class-icon" class="class-icon">🔮</span>
              <span id="p2-class-name">法師</span>
              <span id="p2-score" class="zone-score">傷害: 0</span>
            </div>
            <div id="matrix-p2" class="word-matrix"></div>
          </div>
        </div>
      </div>

      <div id="turn-indicator" class="turn-indicator hidden"></div>
    </section>

    <!-- 結算畫面 -->
    <section id="screen-result" class="screen">
      <h2 id="result-title">戰鬥結算</h2>
      <div id="result-stats" class="result-stats"></div>
      <div id="equipment-unlock" class="equipment-unlock hidden">
        <h3>🎉 傳奇裝備解鎖！</h3>
        <p>弩箭十字弓已裝備至英雄手上！</p>
      </div>
      <button id="btn-replay" class="btn btn-primary">再戰一局</button>
    </section>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
